spring.application.name=bff
server.port=${SERVER_PORT:8080}

# URLs de Microservicios — inyectadas por docker-compose
ms.users.url=${MS_USERS_URL:http://localhost:8081}
ms.pets.url=${MS_PETS_URL:http://localhost:8082}
ms.notification.url=${MS_NOTIFICATION_URL:http://localhost:8083}
ms.sightings.url=${MS_SIGHTINGS_URL:http://localhost:8084}
ms.matching.url=${MS_MATCHING_URL:http://localhost:8085}

# CORS
bff.cors.allowed-origins=http://localhost:3000,https://sanosysalvos-five.vercel.app
# ==========================================
# CONFIGURACIÓN DE SWAGGER CENTRALIZADO (BFF)
# ==========================================

# Habilitar la interfaz web gráfica en el puerto del BFF (por defecto 8080)
# ==========================================
# CONFIGURACIÓN DE SWAGGER CENTRALIZADO (BFF)
# ==========================================
# ==========================================
# CONFIGURACIÓN SWAGGER PROXY DEFINITIVA (BFF)
# ==========================================
# ==========================================
# CONFIGURACIÓN SWAGGER PROXY (BFF)
# ==========================================
# ==========================================
# CONFIGURACIÓN SWAGGER PROXY INTERNA (BFF)
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html

# 1. Usuarios
springdoc.swagger-ui.urls[0].name=1. Usuarios (MS Users)
springdoc.swagger-ui.urls[0].url=/api-docs/ms-users

# 2. Mascotas
springdoc.swagger-ui.urls[1].name=2. Mascotas (MS Pets)
springdoc.swagger-ui.urls[1].url=/api-docs/ms-pets

# 3. Notificaciones
springdoc.swagger-ui.urls[2].name=3. Notificaciones (MS Notification)
springdoc.swagger-ui.urls[2].url=/api-docs/ms-notification

# 4. Avistamientos
springdoc.swagger-ui.urls[3].name=4. Avistamientos (MS Sightings)
springdoc.swagger-ui.urls[3].url=/api-docs/ms-sightings

# 5. Motor de Coincidencias
springdoc.swagger-ui.urls[4].name=5. Motor de Coincidencias (MS Matching)
springdoc.swagger-ui.urls[4].url=/api-docs/ms-matching

# ==========================================
# CONFIGURACIÓN DE SEGURIDAD (OAuth2/JWT)
# ==========================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://securetoken.google.com/sanos-y-salvos-git