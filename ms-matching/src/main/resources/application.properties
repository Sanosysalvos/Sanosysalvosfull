spring.application.name=ms-matching
server.port=${SERVER_PORT:8085}

# URLs de microservicios — inyectadas por docker-compose
ms.pets.url=${MS_PETS_URL:http://localhost:8082}
ms.sightings.url=${MS_SIGHTINGS_URL:http://localhost:8084}
ms.notification.url=${MS_NOTIFICATION_URL:http://localhost:8083}
ms.users.url=${MS_USERS_URL:http://localhost:8081}

# Umbral mínimo para enviar notificación (70%)
matching.umbral.notificacion=70.0

# Radio máximo en kilómetros para considerar coincidencia total de distancia
matching.radio.km=3.0
# Permitir que las herramientas de OpenAPI expongan los datos sin restricciones
springdoc.api-docs.enabled=true