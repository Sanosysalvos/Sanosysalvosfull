spring.application.name=ms-pets
server.port=8082

# Usa las variables que definiste en el .env y el docker-compose
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Esto es vital para que reconozca los Enums como pet_status
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
=======
# CAMBIO CRÍTICO: De 'validate' a 'update' para que cree las tablas
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Dialecto para PostgreSQL y manejo de Enums
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Esto ayuda a que los Enums se guarden correctamente como strings en la DB
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Microservicio ms-users
ms-users.url=http://ms-users:8081

# Permitir que las herramientas de OpenAPI expongan los datos sin restricciones
springdoc.api-docs.enabled=true